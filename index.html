<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المعهد</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
font-family:Tahoma;
}

.splash{
text-align:center;
width:90%;
max-width:400px;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:20px;
}

.name{
font-size:30px;
font-weight:bold;
color:#1565c0;
margin-bottom:20px;
}

.text{
margin-bottom:15px;
font-size:18px;
}

.bar{
width:100%;
height:12px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#1565c0;
animation:loading 3s linear forwards;
}

@keyframes loading{
from{width:0%;}
to{width:100%;}
}

</style>
</head>

<body>

<div class="splash">

<img src="logo.png" class="logo">

<div class="name">
معهد المستقبل
</div>

<div class="text">
جاري تحميل النظام...
</div>

<div class="bar">
<div class="progress"></div>
</div>

</div>

<script>
setTimeout(()=>{
window.location.href="login.html";
},3000);
</script>

</body>
</html>
