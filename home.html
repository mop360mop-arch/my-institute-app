<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرئيسية</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#f5f7fa;
}

/* الشريط العلوي */

.topbar{
height:60px;
background:#1565c0;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
position:fixed;
top:0;
right:0;
left:0;
z-index:1000;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.username{
font-size:20px;
font-weight:bold;
}

.datetime{
font-size:14px;
}

/* الخلفية السوداء */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:999;
}

/* القائمة الجانبية */

.sidebar{
position:fixed;
top:0;
right:-300px;
width:280px;
height:100%;
background:white;
box-shadow:-3px 0 15px rgba(0,0,0,.2);
transition:.3s;
z-index:1001;
overflow-y:auto;
}

.sidebar.active{
right:0;
}

.logo-box{
text-align:center;
padding:20px;
border-bottom:1px solid #ddd;
}

.logo-box img{
width:100px;
height:100px;
border-radius:50%;
}

.logo-box h2{
margin-top:10px;
color:#1565c0;
}

.menu{
padding:10px;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
font-size:16px;
cursor:pointer;
}

.content{
padding-top:80px;
text-align:center;
}

</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="topbar">

<div class="menu-btn" onclick="openMenu()">
☰
</div>

<div class="username" id="username">
مستخدم
</div>

<div class="datetime" id="datetime">
00:00
</div>

</div>

<div class="sidebar" id="sidebar">

<div class="logo-box">
<img src="icon.png">
<h2>معهد المستقبل</h2>
</div>

<div class="menu">

<button>بداية سنة جديدة</button>

<button>إعدادات المعهد</button>

<button>إعدادات الحساب</button>

<button>نسخ احتياطي</button>

<button onclick="logout()">خروج</button>

</div>

</div>

<div class="content">

<h1>مرحباً بك</h1>

</div>

<script>

document.getElementById("username").innerText =
localStorage.getItem("currentUser") || "مستخدم";

function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").style.display="none";
}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="login.html";

}

function updateTime(){

let now = new Date();

document.getElementById("datetime").innerText =
now.toLocaleString("en-US");

}

updateTime();

setInterval(updateTime,1000);

</script>

</body>
</html>
