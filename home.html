<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرئيسية</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#e4e6eb;
}

/* الشريط العلوي */

.topbar{
height:60px;
background:#5f6368;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
position:fixed;
top:0;
right:0;
left:0;
z-index:1000;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.username{
font-size:20px;
font-weight:bold;
}

.datetime{
font-size:14px;
}

/* الخلفية السوداء */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:999;
}

/* القائمة الجانبية */

.sidebar{
position:fixed;
top:0;
right:-300px;
width:280px;
height:100%;
background:white;
box-shadow:-3px 0 15px rgba(0,0,0,.2);
transition:.3s;
z-index:1001;
overflow-y:auto;
}

.sidebar.active{
right:0;
}

.logo-box{
text-align:center;
padding:20px;
border-bottom:1px solid #ddd;
}

.logo-box img{
width:100px;
height:100px;
border-radius:50%;
}

.logo-box h2{
margin-top:10px;
color:#5f6368;
}

.menu{
padding:10px;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#5f6368;
color:white;
font-size:16px;
cursor:pointer;
}

.content{
padding:80px 15px 20px;
}

/* الأزرار الرئيسية */

.actions{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.actions button{
padding:15px 20px;
border:none;
border-radius:12px;
background:#5f6368;
color:white;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.actions button:hover{
background:#444;
}

/* الكروت */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.card{
background:rgba(255,255,255,0.55);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.4);
border-radius:18px;
padding:25px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:10px;
font-size:18px;
}

.card span{
font-size:32px;
font-weight:bold;
}

.blue{
color:#1976d2;
}

.green{
color:#2e7d32;
}

.red{
color:#d32f2f;
}

.profit{
color:#388e3c;
}

/* الأخبار */

.news{
margin-top:20px;
background:rgba(255,255,255,0.55);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
padding:15px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.news-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#5f6368;
}

</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="topbar">

<div class="menu-btn" onclick="openMenu()">
☰
</div>

<div class="username" id="username">
مستخدم
</div>

<div class="datetime" id="datetime">
00:00
</div>

</div>

<!-- القائمة الجانبية -->

<div class="sidebar" id="sidebar">

<div class="logo-box">
<img src="icon.png">
<h2>معهد المستقبل</h2>
</div>

<div class="menu">

<button>بداية سنة جديدة</button>

<button>إعدادات المعهد</button>

<button>إعدادات الحساب</button>

<button>نسخ احتياطي</button>

<button onclick="logout()">خروج</button>

</div>

</div>

<!-- المحتوى -->

<div class="content">

<div class="actions">

<button>إضافة مدرس</button>

<button>المدرسين</button>

<button>بيانات الطلاب</button>

<button>بيانات المدرسين</button>

<button>صرفيات المعهد</button>

</div>
<div class="cards">

<div class="card blue">
<h3>الطلاب النشطين</h3>
<span>0</span>
</div>

<div class="card green">
<h3>عدد المدرسين</h3>
<span>0</span>
</div>

<div class="card red">
<h3>الطلاب المنسحبين</h3>
<span>0</span>
</div>

<div class="card profit">
<h3>أرباح المعهد</h3>
<span>0</span>
</div>

<div class="card red">
<h3>صرفيات المعهد</h3>
<span>0</span>
</div>

<div></div>

</div>

<div class="news">

<div class="news-title">
الأخبار
</div>

<marquee>
مرحباً بك في نظام إدارة المعهد
</marquee>

</div>

</div>

<script>

document.getElementById("username").innerText =
localStorage.getItem("currentUser") || "مستخدم";

function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").style.display="none";
}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="login.html";

}

function updateTime(){

let now = new Date();

document.getElementById("datetime").innerHTML =
now.toLocaleString("en-US");

}

updateTime();

setInterval(updateTime,1000);

</script>

</body>
</html>
